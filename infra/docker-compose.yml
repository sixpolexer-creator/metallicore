services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: metallicore
      POSTGRES_PASSWORD: metallicore_dev
      POSTGRES_DB: metallicore
    ports:
      - "5432:5432"
    volumes:
      - metallicore_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metallicore"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  metallicore_pgdata:
